
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EcoRank - System v1.0.0</title>
    
    <meta name="theme-color" content="#064e3b" />

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&family=VT323&display=swap" rel="stylesheet">
    <style>
      :root {
        --eco-50: #f0fdf4;
        --eco-100: #dcfce7;
        --eco-200: #bbf7d0;
        --eco-300: #86efac;
        --eco-400: #4ade80;
        --eco-500: #10b981;
        --eco-600: #059669;
        --eco-700: #047857;
        --eco-800: #064e3b;
        --eco-900: #064e3b;
        --eco-950: #020617;
        --pixel-bg: #1a1c2c;
        --pixel-accent: #4ade80;
      }
      
      body {
        font-family: 'Inter', 'Cairo', sans-serif;
        background-color: var(--eco-950);
        margin: 0;
        color: #e2e8f0;
        transition: background-color 0.5s ease;
      }

      body.theme-pixel, body.theme-pixel-cat {
        background-color: var(--pixel-bg);
        image-rendering: pixelated;
      }

      /* Use Cairo for Arabic text elements */
      [dir="rtl"] body, [dir="rtl"] .font-mono {
        font-family: 'Cairo', sans-serif !important;
      }

      .font-mono {
        font-family: 'Press Start 2P', monospace;
      }
      
      .theme-pixel .font-mono, .theme-pixel-cat .font-mono {
        font-family: 'Press Start 2P', monospace;
      }
      
      .font-pixel {
        font-family: 'Press Start 2P', monospace;
      }

      #pixel-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        image-rendering: pixelated;
        display: none;
      }

      body.theme-pixel #pixel-canvas {
        display: block;
      }

      /* Default Grid Background */
      .grid-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        background-image: 
          linear-gradient(rgba(6, 78, 59, 0.1) 1px, transparent 1px),
          linear-gradient(90deg, rgba(6, 78, 59, 0.1) 1px, transparent 1px);
        background-size: 20px 20px;
        z-index: -2;
        pointer-events: none;
      }

      body.theme-pixel .grid-bg, body.theme-pixel-cat .grid-bg {
        display: none;
      }

      /* --- PIXEL ART THEME --- */

      /* Pixel Forest Background */
      .pixel-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -2;
        background: linear-gradient(to bottom, #0f172a 0%, #1e293b 60%, #064e3b 100%);
        overflow: hidden;
      }

      /* Pixel Stars/Fireflies */
      .pixel-stars {
        position: absolute;
        width: 2px;
        height: 2px;
        background: transparent;
        box-shadow: 
          10vw 10vh #fff, 20vw 50vh #fff, 30vw 20vh #fff, 40vw 80vh #fff,
          50vw 10vh #fff, 60vw 40vh #fff, 70vw 90vh #fff, 80vw 30vh #fff,
          90vw 60vh #fff, 15vw 70vh #fff, 85vw 15vh #fff;
        animation: star-twinkle 4s infinite alternate;
      }
      
      .pixel-fireflies {
        position: absolute;
        width: 4px;
        height: 4px;
        background: #4ade80;
        box-shadow: 0 0 4px #4ade80;
        border-radius: 0; /* Square pixels */
        animation: firefly-float 10s infinite linear;
      }

      /* Pixel Trees (CSS Shapes) */
      .pixel-tree {
        position: absolute;
        bottom: 0;
        width: 0;
        height: 0;
        border-left: 20px solid transparent;
        border-right: 20px solid transparent;
        border-bottom: 40px solid #065f46;
        z-index: -1;
      }
      .pixel-tree::after {
        content: '';
        position: absolute;
        top: 40px;
        left: -5px;
        width: 10px;
        height: 10px;
        background: #3f2e18;
      }
      
      /* Animated Pixel Ground */
      .pixel-ground {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 40px;
        background: 
          repeating-linear-gradient(
            90deg,
            #064e3b 0px,
            #064e3b 20px,
            #065f46 20px,
            #065f46 40px
          );
        z-index: -1;
        border-top: 4px solid #047857;
      }

      @keyframes star-twinkle {
        0% { opacity: 0.3; transform: translateY(0); }
        100% { opacity: 1; transform: translateY(-2px); }
      }

      @keyframes firefly-float {
        0% { transform: translate(0, 0); opacity: 0; }
        20% { opacity: 1; }
        80% { opacity: 1; }
        100% { transform: translate(100px, -100px); opacity: 0; }
      }

      /* CRT Scanlines (kept but lighter) */
      .scanlines {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        background: linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0),
          rgba(255, 255, 255, 0) 50%,
          rgba(0, 0, 0, 0.1) 50%,
          rgba(0, 0, 0, 0.1)
        );
        background-size: 100% 4px;
        pointer-events: none;
        z-index: 9999;
        opacity: 0.1;
      }


      /* Subtle Flicker */
      @keyframes flicker {
        0% { opacity: 0.98; }
        5% { opacity: 0.95; }
        10% { opacity: 0.9; }
        15% { opacity: 0.99; }
        20% { opacity: 0.95; }
        25% { opacity: 0.99; }
        30% { opacity: 0.94; }
        35% { opacity: 0.98; }
        40% { opacity: 0.96; }
        100% { opacity: 0.98; }
      }

      .crt-flicker {
        animation: flicker 4s infinite;
      }

      /* Animations */
      @keyframes slideUp {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      .animate-slide-up { animation: slideUp 0.4s ease-out forwards; }
      
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
      
      /* Hide Scrollbar for Cleaner Look in certain areas */
      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
      .scrollbar-hide {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }
    </style>
  <link rel="stylesheet" href="./index.css">
  <script type="module" src="./index.tsx"></script>
</head>
  <body>
    <canvas id="pixel-canvas"></canvas>
    <div class="grid-bg"></div>
    <div class="scanlines"></div>
    <div id="root"></div>
    
    <script>
      const canvas = document.getElementById('pixel-canvas');
      const ctx = canvas.getContext('2d');
      
      let width, height;
      let elements = [];
      let ripples = [];
      
      // Pixel Art Colors
      const WATER_BASE = '#3a5a65';
      const WATER_HIGHLIGHT = '#4b6e79';
      const LILY_PAD_LIGHT = '#8ab060';
      const LILY_PAD_DARK = '#4d6932';
      const FLOWER_PINK = '#ffb7c5';
      const FLOWER_WHITE = '#ffffff';
      const FLOWER_YELLOW = '#fde047';
      const FLOWER_PURPLE = '#a78bfa';
      const FROG_GREEN = '#4ade80';
      const FROG_DARK = '#15803d';
      const FLY_COLOR = '#e5e7eb';
      const DRAGONFLY_BODY = '#38bdf8';
      const DRAGONFLY_WING = '#e0f2fe';

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        // Low resolution for pixel look
        const scale = 4; 
        canvas.width = Math.ceil(width / scale);
        canvas.height = Math.ceil(height / scale);
        canvas.style.width = `${width}px`;
        canvas.style.height = `${height}px`;
        initElements();
      }

      function initElements() {
        elements = [];
        ripples = [];
        
        // Generate Lily Pads
        const numPads = Math.floor((canvas.width * canvas.height) / 2000);
        for (let i = 0; i < numPads; i++) {
          const hasFrog = Math.random() > 0.8;
          elements.push({
            type: 'pad',
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: 5 + Math.random() * 8,
            flower: !hasFrog && Math.random() > 0.6 ? (Math.random() > 0.5 ? 'pink' : 'white') : null,
            frog: hasFrog,
            offset: Math.random() * Math.PI * 2
          });
        }
        
        // Generate Floating Flowers (Lotus)
        const numFlowers = Math.floor(numPads / 3);
        for (let i = 0; i < numFlowers; i++) {
           elements.push({
            type: 'lotus',
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: 3 + Math.random() * 3,
            color: Math.random() > 0.5 ? FLOWER_YELLOW : FLOWER_PURPLE,
            offset: Math.random() * Math.PI * 2
          });
        }

        // Generate Flies
        for (let i = 0; i < 8; i++) {
          elements.push({
            type: 'fly',
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            vx: (Math.random() - 0.5) * 2,
            vy: (Math.random() - 0.5) * 2,
            offset: Math.random() * 100
          });
        }

        // Generate Dragonflies
        for (let i = 0; i < 4; i++) {
          elements.push({
            type: 'dragonfly',
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            vx: (Math.random() - 0.5) * 3,
            vy: (Math.random() - 0.5) * 3,
            offset: Math.random() * 100
          });
        }

        // Generate Ripples
        for (let i = 0; i < 20; i++) {
          ripples.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            width: 4 + Math.random() * 10,
            speed: 0.1 + Math.random() * 0.2
          });
        }
      }

      function drawPixelCircle(cx, cy, r, color) {
        ctx.fillStyle = color;
        for (let y = -r; y <= r; y++) {
          for (let x = -r; x <= r; x++) {
            if (x*x + y*y <= r*r) {
              ctx.fillRect(Math.floor(cx + x), Math.floor(cy + y), 1, 1);
            }
          }
        }
      }

      function drawFrog(x, y) {
        // Body
        ctx.fillStyle = FROG_GREEN;
        ctx.fillRect(x - 2, y - 2, 5, 4);
        // Eyes
        ctx.fillStyle = FROG_DARK;
        ctx.fillRect(x - 2, y - 3, 1, 1);
        ctx.fillRect(x + 2, y - 3, 1, 1);
        // Legs
        ctx.fillStyle = FROG_GREEN;
        ctx.fillRect(x - 3, y, 1, 2);
        ctx.fillRect(x + 3, y, 1, 2);
      }

      function drawFly(x, y) {
        ctx.fillStyle = FLY_COLOR;
        ctx.fillRect(x, y, 1, 1);
        // Wings
        ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
        ctx.fillRect(x - 1, y - 1, 1, 1);
        ctx.fillRect(x + 1, y - 1, 1, 1);
      }

      function drawDragonfly(x, y) {
        // Body
        ctx.fillStyle = DRAGONFLY_BODY;
        ctx.fillRect(x, y, 1, 5);
        ctx.fillRect(x - 1, y + 1, 3, 1); // Thorax
        
        // Wings
        ctx.fillStyle = DRAGONFLY_WING;
        ctx.fillRect(x - 3, y + 1, 2, 1);
        ctx.fillRect(x + 2, y + 1, 2, 1);
        ctx.fillRect(x - 3, y + 3, 2, 1);
        ctx.fillRect(x + 2, y + 3, 2, 1);
      }

      function drawLilyPad(x, y, size) {
        // Main pad
        drawPixelCircle(x, y, size, LILY_PAD_LIGHT);
        // Shadow/Detail
        drawPixelCircle(x, y, size - 2, LILY_PAD_DARK);
        drawPixelCircle(x, y, size - 3, LILY_PAD_LIGHT);
        
        // Notch
        ctx.fillStyle = WATER_BASE;
        ctx.fillRect(x, y, size, size); // Simple notch hack
      }

      function drawFlower(x, y, size, color) {
        // Petals
        drawPixelCircle(x - 2, y, 2, color);
        drawPixelCircle(x + 2, y, 2, color);
        drawPixelCircle(x, y - 2, 2, color);
        drawPixelCircle(x, y + 2, 2, color);
        // Center
        drawPixelCircle(x, y, 1, '#fff090');
      }

      function drawWisteria() {
        // Hanging vines from top right
        const vineX = canvas.width - 40;
        for (let i = 0; i < 10; i++) {
           let x = vineX + (i * 5) + Math.sin(Date.now() / 1000 + i) * 2;
           let len = 20 + Math.random() * 30 + Math.sin(Date.now() / 2000) * 5;
           
           // Vine stem
           ctx.fillStyle = '#4d6932';
           ctx.fillRect(x, 0, 1, len);
           
           // Flowers
           for (let j = 0; j < len; j+=2) {
             if (Math.random() > 0.3) {
                ctx.fillStyle = i % 2 === 0 ? '#ffffff' : '#e9d5ff';
                ctx.fillRect(x - 1 + Math.random()*2, j, 2, 1);
             }
           }
        }
      }

      function animate() {
        ctx.fillStyle = WATER_BASE;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Draw Ripples
        ctx.fillStyle = WATER_HIGHLIGHT;
        ripples.forEach(r => {
          r.x -= r.speed;
          if (r.x < -r.width) r.x = canvas.width + r.width;
          ctx.fillRect(Math.floor(r.x), Math.floor(r.y), Math.floor(r.width), 1);
        });

        // Draw Elements
        const time = Date.now() / 1000;
        
        // Update moving elements
        elements.forEach(el => {
          if (el.type === 'fly' || el.type === 'dragonfly') {
            // Erratic movement
            el.x += el.vx + Math.sin(time * 5 + el.offset) * 0.5;
            el.y += el.vy + Math.cos(time * 3 + el.offset) * 0.5;
            
            // Bounce off walls
            if (el.x < 0 || el.x > canvas.width) el.vx *= -1;
            if (el.y < 0 || el.y > canvas.height) el.vy *= -1;
            
            // Random direction change
            if (Math.random() < 0.02) {
              el.vx = (Math.random() - 0.5) * (el.type === 'dragonfly' ? 3 : 2);
              el.vy = (Math.random() - 0.5) * (el.type === 'dragonfly' ? 3 : 2);
            }
          }
        });

        // Sort by Y for simple depth
        elements.sort((a, b) => a.y - b.y);

        elements.forEach(el => {
          const bob = Math.sin(time + (el.offset || 0)) * 2;
          
          if (el.type === 'pad') {
            drawLilyPad(el.x, el.y + bob, el.size);
            if (el.frog) {
               drawFrog(el.x, el.y + bob);
            } else if (el.flower) {
              drawFlower(el.x, el.y + bob, 3, el.flower === 'pink' ? FLOWER_PINK : FLOWER_WHITE);
            }
          } else if (el.type === 'lotus') {
             drawFlower(el.x, el.y + bob, el.size, el.color);
          } else if (el.type === 'fly') {
             drawFly(el.x, el.y);
          } else if (el.type === 'dragonfly') {
             drawDragonfly(el.x, el.y);
          }
        });
        
        drawWisteria();

        requestAnimationFrame(animate);
      }

      window.addEventListener('resize', resize);
      resize();
      animate();
    </script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
