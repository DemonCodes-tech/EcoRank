    <script src="https://cdn.tailwindcss.com"></script>
    <script>

        theme: {
          extend: {
            colors: {
              eco: {
                50: 'var(--eco-50)',
                100: 'var(--eco-100)',
                200: 'var(--eco-200)',

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --eco-50: #f0fdf4;
        --eco-100: #dcfce7;
        --eco-200: #bbf7d0;
        --eco-300: #86efac;
        --eco-400: #4ade80;
        --eco-500: #10b981;
        --eco-600: #059669;
        --eco-700: #047857;
        --eco-800: #064e3b;
        --eco-900: #064e3b;
        --eco-950: #020617;
      }
      
      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--eco-950);
        margin: 0;
        overflow: hidden;
        color: #e2e8f0;
        transition: background-color 0.5s ease;
        /* Prevent bounce scroll on mobile for app-like feel */
        overscroll-behavior: none;
      }

      /* Use Cairo for Arabic text elements */
      [dir="rtl"] body, [dir="rtl"] .font-mono {
        font-family: 'Cairo', sans-serif !important;
      }

      .font-mono {
        font-family: 'JetBrains Mono', monospace;
      }

      /* --- BETA AESTHETICS --- */

      /* Tech Grid Background */
      .grid-bg {
        background-size: 40px 40px;
        background-image: linear-gradient(to right, rgba(16, 185, 129, 0.05) 1px, transparent 1px),
                          linear-gradient(to bottom, rgba(16, 185, 129, 0.05) 1px, transparent 1px);
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
      }

      /* CRT Scanlines */
      .scanlines {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0),
          rgba(255, 255, 255, 0) 50%,
          rgba(0, 0, 0, 0.2) 50%,
          rgba(0, 0, 0, 0.2)
        );
        background-size: 100% 4px;
        pointer-events: none;
        z-index: 9999;
        opacity: 0.15;
      }

      /* Subtle Flicker */
      @keyframes flicker {
        0% { opacity: 0.98; }
        5% { opacity: 0.95; }
        10% { opacity: 0.9; }
        15% { opacity: 0.99; }
        20% { opacity: 0.95; }
        25% { opacity: 0.99; }
        30% { opacity: 0.94; }
        35% { opacity: 0.98; }
        40% { opacity: 0.96; }
        100% { opacity: 0.98; }
      }

      .crt-flicker {
        animation: flicker 4s infinite;
      }

      /* Glitch Text Effect */
      .glitch-text {
        position: relative;
      }
      
      .glitch-text::before,
      .glitch-text::after {
        content: attr(data-text);
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }

      /* Animations */
      @keyframes slideUp {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      .animate-slide-up { animation: slideUp 0.4s ease-out forwards; }
      
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
    </style>
  </head>
  <body>
    <div class="grid-bg"></div>
    <div class="scanlines"></div>
    <div id="root"></div>
  </body>
